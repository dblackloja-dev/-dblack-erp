<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Sincronizar Estoque</title></head>
<body style="background:#111;color:#fff;font-family:Arial;padding:40px;text-align:center">
<h1>D'Black ERP — Sincronizar Estoque</h1>
<p>Clique no botão para enviar o estoque deste navegador para o servidor.</p>
<button id="btn" style="padding:20px 40px;font-size:20px;background:#FFD740;color:#000;border:none;border-radius:12px;cursor:pointer;font-weight:bold">SINCRONIZAR ESTOQUE</button>
<div id="log" style="margin-top:20px;text-align:left;background:#222;padding:20px;border-radius:10px"></div>
<script>
document.getElementById('btn').onclick = async function() {
  var log = document.getElementById('log');
  var btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Sincronizando...';
  log.innerHTML = '';

  var token = localStorage.getItem('dblack_token');
  if (!token) { log.innerHTML = '<p style="color:red">ERRO: Faça login no ERP primeiro.</p>'; btn.disabled = false; btn.textContent = 'SINCRONIZAR ESTOQUE'; return; }

  var stock = JSON.parse(localStorage.getItem('dblack_stock') || '{}');
  var total = 0;
  for (var sid in stock) for (var pid in stock[sid]) total++;

  if (total === 0) { log.innerHTML = '<p style="color:orange">Nenhum estoque encontrado no navegador.</p>'; btn.disabled = false; btn.textContent = 'SINCRONIZAR ESTOQUE'; return; }

  log.innerHTML = '<p>Enviando ' + total + ' produtos de uma vez...</p>';

  try {
    var res = await fetch('/api/stock/bulk', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ stock: stock })
    });
    var data = await res.json();
    if (res.ok) {
      log.innerHTML += '<p style="color:#00E676;font-size:20px;font-weight:bold">PRONTO! ' + data.count + ' produtos sincronizados!</p>';
      btn.textContent = 'CONCLUIDO!';
    } else {
      log.innerHTML += '<p style="color:red">Erro: ' + (data.error || 'desconhecido') + '</p>';
      btn.disabled = false; btn.textContent = 'TENTAR DE NOVO';
    }
  } catch(e) {
    log.innerHTML += '<p style="color:red">Erro de rede: ' + e.message + '</p>';
    btn.disabled = false; btn.textContent = 'TENTAR DE NOVO';
  }
};
</script>
</body></html>
