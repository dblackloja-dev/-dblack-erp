<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Sincronizar Estoque</title></head>
<body style="background:#111;color:#fff;font-family:Arial;padding:40px;text-align:center">
<h1>D'Black ERP — Sincronizar Estoque</h1>
<p>Clique no botão para enviar o estoque deste navegador para o servidor.</p>
<button id="btn" style="padding:20px 40px;font-size:20px;background:#FFD740;color:#000;border:none;border-radius:12px;cursor:pointer;font-weight:bold">SINCRONIZAR ESTOQUE</button>
<div id="log" style="margin-top:20px;text-align:left;background:#222;padding:20px;border-radius:10px;max-height:400px;overflow:auto"></div>
<script>
document.getElementById('btn').onclick = async function() {
  var log = document.getElementById('log');
  var btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Sincronizando...';
  log.innerHTML = '';

  var token = localStorage.getItem('dblack_token');
  if (!token) { log.innerHTML = '<p style="color:red">ERRO: Não está logado. Abra o ERP primeiro e faça login.</p>'; btn.disabled = false; btn.textContent = 'SINCRONIZAR ESTOQUE'; return; }

  var stock = JSON.parse(localStorage.getItem('stock') || '{}');
  var total = 0;
  var ok = 0;
  var erros = 0;

  for (var stockId in stock) {
    for (var productId in stock[stockId]) {
      total++;
    }
  }

  log.innerHTML += '<p>Encontrados ' + total + ' produtos no estoque local.</p>';

  for (var stockId in stock) {
    for (var productId in stock[stockId]) {
      var qty = stock[stockId][productId];
      try {
        var res = await fetch('/api/stock/' + stockId + '/' + productId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ quantity: qty })
        });
        if (res.ok) { ok++; }
        else { erros++; log.innerHTML += '<p style="color:orange">Erro em ' + productId + ': HTTP ' + res.status + '</p>'; }
      } catch(e) {
        erros++;
        log.innerHTML += '<p style="color:red">Erro em ' + productId + ': ' + e.message + '</p>';
      }
    }
  }

  log.innerHTML += '<p style="color:#00E676;font-size:18px;font-weight:bold">PRONTO! ' + ok + ' produtos sincronizados, ' + erros + ' erros.</p>';
  btn.textContent = 'CONCLUÍDO!';
};
</script>
</body></html>
