<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Sincronizar Estoque</title></head>
<body style="background:#111;color:#fff;font-family:Arial;padding:40px;text-align:center">
<h1>D'Black ERP — Sincronizar Estoque</h1>
<p>Clique no botão para enviar o estoque deste navegador para o servidor.</p>
<button id="btn" style="padding:20px 40px;font-size:20px;background:#FFD740;color:#000;border:none;border-radius:12px;cursor:pointer;font-weight:bold">SINCRONIZAR ESTOQUE</button>
<div id="log" style="margin-top:20px;text-align:left;background:#222;padding:20px;border-radius:10px"></div>
<script>
document.getElementById('btn').onclick = async function() {
  var log = document.getElementById('log');
  var btn = document.getElementById('btn');
  btn.disabled = true;
  log.innerHTML = '';

  var token = localStorage.getItem('dblack_token');
  if (!token) { log.innerHTML = '<p style="color:red">ERRO: Faça login no ERP primeiro.</p>'; btn.disabled = false; return; }

  var stock = JSON.parse(localStorage.getItem('dblack_stock') || '{}');

  // Monta lista de todos os itens
  var items = [];
  for (var sid in stock) for (var pid in stock[sid]) items.push({sid:sid, pid:pid, qty:stock[sid][pid]});

  if (items.length === 0) { log.innerHTML = '<p style="color:orange">Nenhum estoque encontrado.</p>'; btn.disabled = false; return; }

  log.innerHTML = '<p>Total: ' + items.length + ' produtos. Enviando em lotes...</p>';

  var BATCH = 300;
  var totalOk = 0;
  var totalErr = 0;
  var batches = Math.ceil(items.length / BATCH);

  for (var i = 0; i < batches; i++) {
    var chunk = items.slice(i * BATCH, (i + 1) * BATCH);
    var stockBatch = {};
    for (var j = 0; j < chunk.length; j++) {
      if (!stockBatch[chunk[j].sid]) stockBatch[chunk[j].sid] = {};
      stockBatch[chunk[j].sid][chunk[j].pid] = chunk[j].qty;
    }

    btn.textContent = 'Lote ' + (i+1) + '/' + batches + '...';
    log.innerHTML += '<p>Enviando lote ' + (i+1) + '/' + batches + ' (' + chunk.length + ' produtos)...</p>';

    try {
      var res = await fetch('/api/stock/bulk', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ stock: stockBatch })
      });
      var data = await res.json();
      if (res.ok) {
        totalOk += data.count;
        log.innerHTML += '<p style="color:#00E676">✅ Lote ' + (i+1) + ': ' + data.count + ' ok</p>';
      } else {
        totalErr += chunk.length;
        log.innerHTML += '<p style="color:red">❌ Lote ' + (i+1) + ': ' + (data.error||'erro') + '</p>';
      }
    } catch(e) {
      totalErr += chunk.length;
      log.innerHTML += '<p style="color:red">❌ Lote ' + (i+1) + ': ' + e.message + '</p>';
    }
  }

  log.innerHTML += '<p style="color:#00E676;font-size:22px;font-weight:bold;margin-top:16px">PRONTO! ' + totalOk + ' sincronizados, ' + totalErr + ' erros.</p>';
  btn.textContent = 'CONCLUÍDO!';
};
</script>
</body></html>
